services:

  db:
    image: postgres:16
    container_name: postgres-mensajeria
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: mensajeria
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5


  backend:
    image: node:20-alpine
    container_name: backend-mensajeria
    working_dir: /app
    restart: unless-stopped

    depends_on:
      db:
        condition: service_healthy

    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules

    command: sh -c "if [ ! -d node_modules ]; then npm install; fi && npm run dev"

    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      DB_HOST: db
      DB_USER: postgres
      DB_PASSWORD: 123456
      DB_NAME: mensajeria
      DB_PORT: 5432
      PORT: 4000
      JWT_SECRET: 302a39c35c86b3cbb01716c13ecf614d423e5391966d9e9ec9295cb733573b05f74e84d92f4230c985231e461c1361b3f7c43eeb0fff9b6e25f8a010a522d6f8
      CLOUDINARY_CLOUD_NAME: dhen7qtci
      CLOUDINARY_API_KEY: 866177287498518
      CLOUDINARY_API_SECRET: geB7J4_WzbGIk9UtE_BXOatAG3I
      RESEND_API_KEY: re_MuWqMuFd_2kGvdBYXSTifFNQVNRsFUKj5
      EMAIL_FROM: authentification@joseolvera.com

    ports:
      - "4000:4000"

  frontend:
    image: node:20-alpine
    container_name: frontend-mensajeria
    working_dir: /app
    restart: unless-stopped

    depends_on:
      - backend

    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

    command: sh -c "if [ ! -d node_modules ]; then npm install; fi && npm run dev"

    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api
      WATCHPACK_POLLING: "true"
      WATCHPACK_POLLING_INTERVAL: "1000"
      CHOKIDAR_USEPOLLING: "true"

    ports:
      - "3000:3000"

volumes:
  postgres_data:
  backend_node_modules:
  frontend_node_modules: